<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBIT Student Portal | Secure Campus Dining</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --vbit-blue: #0f172a; --gold: #f1c40f; --light: #f8fafc; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #0f172a; color: white; overflow-x: hidden; }
        
        /* VBIT CAMPUS BACKGROUND */
        #auth-screen { 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.8)), 
                        url('https://images.shiksha.com/mediadata/images/1555582672php73KVPG.jpeg');
            background-size: cover;
            background-position: center;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(12px); 
            padding: 40px; 
            border-radius: 30px; 
            width: 380px; 
            max-width: 90%;
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        nav { background: var(--vbit-blue); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        input { width: 100%; padding: 14px; margin: 12px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 16px; background: var(--gold); border: none; border-radius: 50px; font-weight: 700; cursor: pointer; color: #0f172a; transition: 0.3s; }
        
        #app-dashboard { display: none; background: var(--light); color: #1e293b; min-height: 100vh; padding: 20px 5%; }
        #status-display { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 25px; display: none; }
        
        .controls { margin-bottom: 25px; }
        #searchBar { width: 100%; padding: 15px; border-radius: 15px; color:black; border: 1px solid #e2e8f0; font-size: 1rem; margin-bottom: 15px; }
        .categories { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; -ms-overflow-style: none; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn { padding: 10px 24px; border-radius: 50px; border: 1px solid #cbd5e1; background: white; cursor: pointer; white-space: nowrap; font-weight: 600; }
        .cat-btn.active { background: var(--vbit-blue); color: white; border-color: var(--vbit-blue); }
        
        /* UPDATED: FLEXIBLE GRID FOR MIN 2 ITEMS */
        .menu-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* Default to 2 columns for mobile */
            gap: 12px; 
        }

        .food-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; padding-bottom: 15px; border: 1px solid #f1f5f9; }
        .food-card img { width: 100%; height: 120px; object-fit: cover; }
        .food-card h3 { font-size: 0.9rem; margin: 10px 5px; height: 2.4em; overflow: hidden; }
        .order-btn { background: var(--vbit-blue); color: white; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        
        #payment-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .payment-card { background: white; color: #1e293b; padding: 25px; border-radius: 25px; width: 340px; max-width: 85%; text-align: center; }
        .pay-option { border: 1px solid #ddd; padding: 12px; border-radius: 12px; cursor: pointer; margin: 8px 0; font-weight: 600; }
        #qr-screen img { width: 100%; max-width: 220px; margin: 15px 0; border: 5px solid #f1f5f9; border-radius: 15px; }

        /* TABLET & DESKTOP SCALING */
        @media (min-width: 600px) {
            .menu-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }
            .food-card img { height: 180px; }
            .food-card h3 { font-size: 1.1rem; }
            .order-btn { font-size: 1rem; padding: 12px 25px; }
        }

        @media (max-width: 480px) {
            .glass-card { padding: 25px; }
            nav span { font-size: 1rem !important; }
        }
    </style>
</head>
<body>

    <div id="auth-screen">

            <input type="email" id="email" placeholder="Email @vbithyd.ac.in">
            <input type="tel" id="phone" placeholder="10-Digit Mobile" maxlength="10">
            <button class="login-btn" onclick="strictLogin()">Enter Menu</button>

    <div id="app-dashboard">

        </div>
        <div class="controls">
            <input type="text" id="searchBar" placeholder="Search food..." onkeyup="filterMenu()">
            <div class="categories">
                <button class="cat-btn active" onclick="filterCategory('All', this)">All Items</button>
                <button class="cat-btn" onclick="filterCategory('Tiffins', this)">Tiffins</button>
                <button class="cat-btn" onclick="filterCategory('Main', this)">Lunch & Biryanis</button>
                <button class="cat-btn" onclick="filterCategory('Snacks', this)">Fast Food & Snacks</button>
                <button class="cat-btn" onclick="filterCategory('Drinks', this)">Beverages</button>
            </div>
        </div>
        <div id="menuGrid" class="menu-grid"></div>
    </div>

                <p id="pay-amount" style="font-weight:bold; color:#059669;"></p>
                <div class="pay-option" onclick="showQR('PhonePe')">PhonePe</div>
                <div class="pay-option" onclick="showQR('GPay')">Google Pay</div>
                <button onclick="closePayment()" style="color:red; cursor:pointer; background:none; border:none;">Cancel</button>
            </div>
            <div id="qr-screen" style="display:none;">
                <h3>Scan & Pay</h3>

    </div>

        let currentCategory = 'All';
        let pendingOrder = null;

        function strictLogin() {
            const email = document.getElementById('email').value.trim().toLowerCase();
            const phone = document.getElementById('phone').value.trim();
            if (email.endsWith("@vbithyd.ac.in") && phone.length === 10) {
                localStorage.setItem('vbit_user_id', email.split('@')[0]);
                localStorage.setItem('vbit_user_phone', phone);
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-dashboard').style.display = 'block';
                renderMenu(menuItems);
                startStatusSync();
            } else { alert("Use VBIT email and 10-digit phone."); }
        }

        function renderMenu(items) {
            document.getElementById('menuGrid').innerHTML = items.map(item => `
                <div class="food-card" data-name="${item.name.toLowerCase()}" data-cat="${item.cat}">
                    <img src="${item.img}" onerror="this.src='https://via.placeholder.com/400x180?text=Food'">
                    <h3>${item.name}</h3>
                    <p style="color:#10b981; font-weight:700;">₹${item.price}</p>
                    <button class="order-btn" onclick="startPayment('${item.name}', ${item.price})">Order Now</button>
                </div>
            `).join('');
        }

        function startPayment(name, price) {
            pendingOrder = { name, price };
            document.getElementById('pay-amount').innerText = `Amount: ₹${price}`;
            document.getElementById('payment-modal').style.display = 'flex';
            document.getElementById('qr-screen').style.display = 'none';
            document.getElementById('method-screen').style.display = 'block';
        }

        function showQR(method) {
            document.getElementById('method-screen').style.display = 'none';
            document.getElementById('qr-screen').style.display = 'block';
            let sec = 10;
            const timer = setInterval(() => {
                sec--;
                document.getElementById('payment-timer').innerText = `Redirecting in ${sec}s...`;
                if(sec <= 0){ clearInterval(timer); processFinal(); }
            }, 1000);
        }

        function processFinal() {
            let orders = JSON.parse(localStorage.getItem('VBIT_FINAL_SYSTEM')) || [];
            const token = "TKT-" + Math.floor(1000 + Math.random() * 9000);
            orders.push({ 
                id: localStorage.getItem('vbit_user_id'), 
                phone: localStorage.getItem('vbit_user_phone'), 
                item: pendingOrder.name, 
                price: pendingOrder.price, 
                token: token, 
                status: "Paid & New" 
            });
            localStorage.setItem('VBIT_FINAL_SYSTEM', JSON.stringify(orders));
            document.getElementById('payment-modal').style.display = 'none';
            alert("Verification Sent! Token: " + token);
        }

        function filterMenu() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const cards = document.querySelectorAll('.food-card');
            cards.forEach(card => {
                const matchesSearch = card.getAttribute('data-name').includes(query);
                const matchesCat = (currentCategory === 'All' || card.getAttribute('data-cat') === currentCategory);
                card.style.display = (matchesSearch && matchesCat) ? 'block' : 'none';
            });
        }

        function filterCategory(cat, btn) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterMenu();
        }

        function closePayment() { document.getElementById('payment-modal').style.display = 'none'; }

        function startStatusSync() {
            setInterval(() => {
                const orders = JSON.parse(localStorage.getItem('VBIT_FINAL_SYSTEM')) || [];
                const myID = localStorage.getItem('vbit_user_id');
                const myOrder = [...orders].reverse().find(o => o.id === myID);
                const display = document.getElementById('status-display');
                if (!myOrder) { display.style.display = "none"; return; }
                const nameEl = document.getElementById('status-item-name');
                const descEl = document.getElementById('status-desc');

                if (myOrder.status === "Cancelled") {
                    const timePassed = (Date.now() - (myOrder.cancelledAt || 0)) / 1000;
                    if (timePassed < 30) {
                        display.style.display = "block";
                        display.style.borderLeft = "8px solid #ef4444";
                        nameEl.innerText = "❌ Order Rejected";
                        descEl.innerText = `Payment check failed. Clears in ${Math.round(30 - timePassed)}s`;
                    } else { display.style.display = "none"; }
                } else if (myOrder.status === "Done") {
                    const timePassed = (Date.now() - (myOrder.doneAt || 0)) / 1000;
                    if (timePassed < 30) {
                        display.style.display = "block";
                        display.style.borderLeft = "8px solid #10b981";
                        nameEl.innerText = "✅ Enjoy Your Meal!";
                        descEl.innerText = `Order collected. Clears in ${Math.round(30 - timePassed)}s`;
                    } else { display.style.display = "none"; }
                } else if (myOrder.status === "Paid & New") {
                    display.style.display = "block";
                    display.style.borderLeft = "8px solid #ef4444";
                    nameEl.innerText = "Verifying Payment...";
                    descEl.innerText = "Wait for manager approval.";
                } else {
                    display.style.display = "block";
                    display.style.borderLeft = "8px solid #3b82f6";
                    nameEl.innerText = `${myOrder.item} (#${myOrder.token})`;
                    descEl.innerText = "Status: " + myOrder.status;
                }
            }, 1000);
        }
    </script>
