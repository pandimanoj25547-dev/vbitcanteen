<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VBIT Admin | Live Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f19; --card: #161b22; --text: #e6edf3; --accent: #3b82f6; --gold: #f1c40f; --wa: #25d366; }
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .analytics-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #30363d; text-align: center; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--gold); display: block; }
        .stat-label { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; }
        .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .col { background: var(--card); border-radius: 12px; padding: 15px; min-height: 75vh; border: 1px solid #30363d; }
        .col h2 { font-size: 0.9rem; text-align: center; color: #8b949e; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .card { background: #1e293b; padding: 15px; margin-bottom: 15px; border-radius: 10px; border-left: 5px solid #ef4444; position: relative; }
        .token { font-weight: 600; color: var(--gold); display: block; }
        .item-name { font-size: 1.1rem; display: block; margin: 5px 0; }
        .user-info { font-size: 0.75rem; color: #94a3b8; display: block; }
        button { width: 100%; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; margin-top: 8px; transition: 0.2s; }
        .btn-verify { background: #10b981; color: white; }
        .btn-reject { background: #ef4444; color: white; margin-top: 5px; }
        #wa-log { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .wa-bubble { background: var(--wa); color: white; padding: 12px; border-radius: 8px; margin-top: 10px; font-weight: bold; border-left: 4px solid white; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1 style="color: var(--gold)">VBIT Admin Dashboard</h1>
        <button style="width:auto; background:#ef4444; color:white; padding:10px 20px;" onclick="resetDatabase()">Reset All Data</button>
    </div>

    <div id="wa-log"></div>

    <div class="analytics-bar">
        <div class="stat-card"><span class="stat-label">Total Revenue</span><span class="stat-value" id="rev">₹0</span></div>
        <div class="stat-card"><span class="stat-label">Served Orders</span><span class="stat-value" id="serv">0</span></div>
        <div class="stat-card"><span class="stat-label">Pending Orders</span><span class="stat-value" id="pend" style="color:#ef4444">0</span></div>
    </div>

    <div class="board">
        <div class="col"><h2>⏳ Verify Payment</h2><div id="col-verify"></div></div>
        <div class="col"><h2>🍳 In Kitchen</h2><div id="col-prep"></div></div>
        <div class="col"><h2>🔔 Ready</h2><div id="col-ready"></div></div>
        <div class="col"><h2>✅ Completed</h2><div id="col-done"></div></div>
    </div>

    <script>
        // REPLACE THE BLOCK BELOW WITH YOUR ACTUAL FIREBASE SETTINGS
        const firebaseConfig = {
            apiKey: "PASTE_YOUR_API_KEY_HERE",
            authDomain: "PASTE_YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "PASTE_YOUR_DATABASE_URL_HERE",
            projectId: "PASTE_YOUR_PROJECT_ID",
            storageBucket: "PASTE_YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "PASTE_YOUR_SENDER_ID",
            appId: "PASTE_YOUR_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function triggerWhatsApp(phone, status, item) {
            let msg = "";
            if(status === 'Preparing') msg = `VBIT Canteen: Order for *${item}* is Verified and now PREPARING! 👨‍🍳`;
            if(status === 'Ready') msg = `VBIT Canteen: Your *${item}* is READY! Please collect it at the counter. 🔔`;
            if(status === 'Done') msg = `VBIT Canteen: Order for *${item}* completed. Thank you! ✅`;
            if(status === 'Cancelled') msg = `VBIT Canteen: Sorry, your order for *${item}* was REJECTED. ❌`;

            const url = `https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`;
            const log = document.getElementById('wa-log');
            const div = document.createElement('div');
            div.className = 'wa-bubble';
            div.innerText = `💬 WhatsApp Sent to +91${phone}`;
            log.appendChild(div);
            setTimeout(() => div.remove(), 4000);
            window.open(url, '_blank');
        }

        database.ref('orders').on('value', (snapshot) => {
            const orders = snapshot.val() || {};
            let revenue = 0, served = 0, pending = 0;

            const cols = { 'Paid & New': 'col-verify', 'Preparing': 'col-prep', 'Ready': 'col-ready', 'Done': 'col-done' };
            Object.values(cols).forEach(id => document.getElementById(id).innerHTML = "");

            for (let id in orders) {
                const o = orders[id];
                if (o.status === "Cancelled") continue;

                if (o.status !== "Paid & New") {
                    revenue += Number(o.price || 0);
                    if (o.status === "Done") served++;
                } else {
                    pending++;
                }

                const card = `
                    <div class="card" style="border-left-color: ${o.status === 'Paid & New' ? '#ef4444' : '#10b981'}">
                        <span class="token">${o.token}</span>
                        <span class="item-name">${o.item}</span>
                        <span class="user-info">Student: ${o.id} | ₹${o.price}</span>
                        <span class="user-info">📞 ${o.phone}</span>
                        
                        ${o.status === 'Paid & New' ? `
                            <button class="btn-verify" onclick="updateStatus('${id}', 'Preparing')">Verify & Accept</button>
                            <button class="btn-reject" onclick="rejectOrder('${id}')">Reject Order</button>
                        ` : ''}
                        ${o.status === 'Preparing' ? `<button class="btn-verify" style="background:#3b82f6" onclick="updateStatus('${id}', 'Ready')">Mark Ready</button>` : ''}
                        ${o.status === 'Ready' ? `<button class="btn-verify" style="background:#f59e0b" onclick="updateStatus('${id}', 'Done')">Finish Order</button>` : ''}
                    </div>
                `;
                if(cols[o.status]) document.getElementById(cols[o.status]).innerHTML += card;
            }

            document.getElementById('rev').innerText = "₹" + revenue;
            document.getElementById('serv').innerText = served;
            document.getElementById('pend').innerText = pending;
        });

        function updateStatus(firebaseID, newStatus) {
            database.ref('orders/' + firebaseID).once('value').then((snap) => {
                const data = snap.val();
                let updates = { status: newStatus };
                if (newStatus === 'Done') updates.doneAt = Date.now();
                
                triggerWhatsApp(data.phone, newStatus, data.item);
                database.ref('orders/' + firebaseID).update(updates);
            });
        }

        function rejectOrder(firebaseID) {
            if(confirm("Reject this order?")) {
                database.ref('orders/' + firebaseID).once('value').then((snap) => {
                    const data = snap.val();
                    triggerWhatsApp(data.phone, 'Cancelled', data.item);
                    database.ref('orders/' + firebaseID).update({
                        status: "Cancelled",
                        cancelledAt: Date.now()
                    });
                });
            }
        }

        function resetDatabase() {
            if(confirm('Clear all orders from the cloud?')) {
                database.ref('orders').remove();
            }
        }
    </script>
</body>
</html>
